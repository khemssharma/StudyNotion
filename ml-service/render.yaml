# render.yaml - StudyNotion ML Service (NCF Inference)
# Training runs on Kaggle/Colab (GPU). Inference runs here (CPU).
# Service works in popularity-fallback mode until NCF artifacts are uploaded.

services:
  - type: web
    name: Studynotion_ML
    env: python
    plan: free
    rootDir: ml-service
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --workers 1 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT
    healthCheckPath: /

    envVars:
      - key: MONGO_URI
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
